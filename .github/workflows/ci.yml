name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Backend: lint + test (Python 3.11)
  # ------------------------------------------------------------------
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -q
        env:
          PYTHONDONTWRITEBYTECODE: '1'

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  # ------------------------------------------------------------------
  # Frontend: lint + test + build (Node 20)
  # ------------------------------------------------------------------
  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Run Jest tests
        run: npx jest --ci --coverage --coverageReporters=text --coverageReporters=cobertura
        env:
          CI: 'true'

      - name: Build
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/cobertura-coverage.xml
          retention-days: 14

  # ------------------------------------------------------------------
  # Bicep validation
  # ------------------------------------------------------------------
  bicep-validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI – bicep build
        run: |
          az bicep install
          for f in $(find infrastructure -name '*.bicep' -type f); do
            echo "Validating $f ..."
            az bicep build --file "$f" --stdout > /dev/null
          done

  # ------------------------------------------------------------------
  # Security scan
  # ------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  # ------------------------------------------------------------------
  # Docker build test
  # ------------------------------------------------------------------
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t impressions-backend:test .

      - name: Verify image
        run: docker inspect impressions-backend:test --format='{{.Config.Cmd}}'
