name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  PROJECT_NAME: impgen2
  LOCATION: swedencentral

jobs:
  # ------------------------------------------------------------------
  # Gate: CI must pass first
  # ------------------------------------------------------------------
  ci-gate:
    if: github.event_name == 'push'
    uses: ./.github/workflows/ci.yml

  # ------------------------------------------------------------------
  # Step 1: Validate Infrastructure
  # ------------------------------------------------------------------
  validate-infrastructure:
    name: "Step 1: Validate Bicep"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: always() && (needs.ci-gate.result == 'success' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4
      - name: Validate Bicep templates
        run: |
          az bicep install
          for f in $(find infrastructure -name '*.bicep' -type f); do
            echo "✓ Validating $f"
            az bicep build --file "$f" --stdout > /dev/null
          done
          echo "✓ All Bicep templates valid"

  # ------------------------------------------------------------------
  # Step 2: Deploy Infrastructure
  # ------------------------------------------------------------------
  deploy-infrastructure:
    name: "Step 2: Deploy Infrastructure"
    runs-on: ubuntu-latest
    needs: [validate-infrastructure]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      container-app-url: ${{ steps.deploy.outputs.containerAppUrl }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy
        run: |
          RESULT=$(az deployment sub create \
            --location ${{ env.LOCATION }} \
            --template-file infrastructure/main.bicep \
            --parameters environmentName=${{ env.ENVIRONMENT }} \
                         location=${{ env.LOCATION }} \
                         projectName=${{ env.PROJECT_NAME }} \
            --name "deploy-${{ env.ENVIRONMENT }}-${{ github.run_number }}" \
            --query "properties.outputs" -o json)
          
          echo "containerAppUrl=$(echo $RESULT | jq -r '.containerAppUrl.value')" >> $GITHUB_OUTPUT
          echo "✓ Infrastructure deployed"

  # ------------------------------------------------------------------
  # Step 3: Verify Resources
  # ------------------------------------------------------------------
  verify-resources:
    name: "Step 3: Verify Resources"
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify deployed resources
        run: |
          RG="${{ env.PROJECT_NAME }}-rg-${{ env.ENVIRONMENT }}"
          echo "Checking resources in $RG..."
          
          RESOURCES=$(az resource list -g "$RG" --query "[].{name:name, type:type}" -o table)
          echo "$RESOURCES"
          
          # Verify GPT-5.2 deployment
          MODEL=$(az cognitiveservices account deployment show \
            --name "${{ env.PROJECT_NAME }}-openai-${{ env.ENVIRONMENT }}" \
            -g "$RG" \
            --deployment-name "gpt-52" \
            --query "properties.model.name" -o tsv 2>/dev/null || echo "NOT FOUND")
          echo "✓ OpenAI model: $MODEL"

  # ------------------------------------------------------------------
  # Step 4: Build & Deploy Backend
  # ------------------------------------------------------------------
  deploy-backend:
    name: "Step 4: Deploy Backend"
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push Docker image
        working-directory: backend
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/impressions-backend:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "✓ Image pushed: $IMAGE"

      - name: Update Container App
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/impressions-backend:${{ github.sha }}
          RG="${{ env.PROJECT_NAME }}-rg-${{ env.ENVIRONMENT }}"
          APP="${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}"
          
          az containerapp update --name $APP -g $RG --image $IMAGE
          echo "✓ Container App updated"

  # ------------------------------------------------------------------
  # Step 5: Verify Backend Health
  # ------------------------------------------------------------------
  verify-backend:
    name: "Step 5: Verify Backend"
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Health check
        run: |
          RG="${{ env.PROJECT_NAME }}-rg-${{ env.ENVIRONMENT }}"
          APP="${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}"
          
          URL=$(az containerapp show --name $APP -g $RG \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s "https://${URL}/health" || echo "{}")
            if echo "$RESPONSE" | grep -q "healthy"; then
              echo "✓ Backend healthy"
              echo "$RESPONSE" | jq .
              exit 0
            fi
            echo "Retry $i/5..."
            sleep 15
          done
          echo "✗ Backend health check failed"
          exit 1

      - name: Verify pipeline info
        run: |
          RG="${{ env.PROJECT_NAME }}-rg-${{ env.ENVIRONMENT }}"
          APP="${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}"
          
          URL=$(az containerapp show --name $APP -g $RG \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          curl -s "https://${URL}/api/generate/pipeline-info" | jq .

  # ------------------------------------------------------------------
  # Step 6: Deploy Frontend
  # ------------------------------------------------------------------
  deploy-frontend:
    name: "Step 6: Deploy Frontend"
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.BACKEND_URL }}
          NEXT_PUBLIC_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          NEXT_PUBLIC_AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: .next
          skip_app_build: true

  # ------------------------------------------------------------------
  # Step 7: Smoke Test
  # ------------------------------------------------------------------
  smoke-test:
    name: "Step 7: Smoke Test"
    runs-on: ubuntu-latest
    needs: [verify-backend, deploy-frontend]

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run smoke tests
        run: |
          RG="${{ env.PROJECT_NAME }}-rg-${{ env.ENVIRONMENT }}"
          APP="${{ env.PROJECT_NAME }}-api-${{ env.ENVIRONMENT }}"
          
          URL=$(az containerapp show --name $APP -g $RG \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo "=== Health Check ==="
          curl -sf "https://${URL}/health" | jq .
          
          echo "=== Pipeline Info ==="
          curl -sf "https://${URL}/api/generate/pipeline-info" | jq .
          
          echo "=== API Docs ==="
          curl -sf "https://${URL}/docs" > /dev/null && echo "✓ Swagger docs accessible"
          
          echo "✓ All smoke tests passed"
